<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdWork - Negocio</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="brand">AdWork</div>
        <div id="who" class="meta">Cargando...</div>
      </div>
      <div class="row">
        <button id="logoutBtn" class="btn danger">Salir</button>
      </div>
    </div>
<section class="card">
  <div class="row" style="justify-content:space-between; margin-bottom:12px;">
    <h3 style="margin:0;">Mi empresa</h3>
    <button id="openEditCompany" class="btn primary">Editar</button>
  </div>

  <div class="item">
    <div class="title" id="bCompanyName">—</div>
    <div class="sub" id="bCompanyType">—</div>
    <div class="sub" id="bCompanyLocation">—</div>
    <div class="sub" id="bRating">—</div>
  </div>
</section>
    <div class="grid">
      <section class="card">
        <h3>Publicar turno</h3>
        <form id="jobForm" class="grid" style="grid-template-columns:1fr; gap:12px;">
          <label>Puesto
            <select id="role" required>
              <option value="camarero">Camarero</option>
              <option value="cocina">Cocina</option>
              <option value="limpieza">Limpieza</option>
              <option value="recepcion">Recepción</option>
              <option value="pica">Pica</option>
              <option value="otros">Otros</option>
            </select>
          </label>
          <div id="otherRoleContainer" style="display:none;">
            <label>Especificar puesto
              <input id="otherRole" type="text" placeholder="Ej: Bartender, DJ..." />
            </label>
          </div>
          <label>Fecha
            <input id="date" type="date" required/>
          </label>

          <div class="row" style="gap:12px;">
            <label style="flex:1;">Desde
              <input id="from" type="time" required />
            </label>
            <label style="flex:1;">Hasta
              <input id="to" type="time" required />
            </label>
          </div>

          <label>Pago (€ / hora)
            <input id="pay" type="number" min="0" step="0.5" required />
          </label>

          <label>Zona (ej: Escaldes)
            <input id="zone" type="text" required />
          </label>

          <label>Notas (opcional)
            <textarea id="notes" placeholder="Uniforme, experiencia, idioma..."></textarea>
          </label>

          <button class="btn primary" type="submit">📢 Publicar</button>
          <div id="msg" class="meta"></div>
        </form>
      </section>

      <section class="card">
          <h3>Mis turnos publicados</h3>
          <div class="list" id="myJobsList"></div>
      </section>

      <section class="card">
          <h3>Historial</h3>
          <div class="list" id="businessHistoryList"></div>
      </section>

      <section class="card">
        <h3>Trabajadores disponibles </h3>
        <div class="list" id="workersList"></div>
      </section>

      <section class="card">
        <h3>Contactos</h3>
        <div class="list" id="contactsList"></div>
      </section>
      
    </div>
  </div>
  <!-- Modal Editar Empresa -->
<div id="editCompanyModal" class="modalOverlay hidden">
  <div class="card modalCard">
    <div class="modalHeader">
      <h3>Editar empresa</h3>
      <button id="closeEditCompany" class="btn">✕</button>
    </div>

    <form id="businessProfileForm" class="grid" style="grid-template-columns:1fr; gap:12px;">
      <label>Nombre de empresa
        <input id="editCompanyName" type="text" />
      </label>

      <label>Rubro
        <select id="editCompanyType">
          <option value="hotel">Hotel</option>
          <option value="restaurante">Restaurante</option>
          <option value="comercio">Comercio</option>
          <option value="otros">Otros</option>
        </select>
      </label>

      <label>Locación
        <input id="editCompanyLocation" type="text" />
      </label>

      <label>Descripción (opcional)
        <textarea id="editCompanyBio" placeholder="Ej: Hotel 4* en el centro..."></textarea>
      </label>

      <button class="btn primary" type="submit">Guardar</button>
      <div id="businessProfileMsg" class="meta"></div>
    </form>
  </div>
</div>
<!-- Modal Postulados -->
<div id="appsModal" class="modalOverlay hidden">
  <div class="card modalCard">
    <div class="modalHeader">
      <h3 id="appsModalTitle">Postulados</h3>
      <button id="closeAppsModal" class="btn">✕</button>
    </div>

    <div class="meta" id="appsModalSub">Cargando...</div>
    <div class="list" id="appsModalList" style="margin-top:12px;"></div>
  </div>
</div>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="dashboard-business.js"></script>
<footer class="footer">
  <div style="margin-bottom:6px;">
    <a href="terms.html">Términos</a> · 
    <a href="privacy.html">Privacidad</a>
  </div>
  <div>
    © 2026 AdWork · contacto: adwork.contacto@gmail.com
  </div>
</footer>
</body>
</html>
