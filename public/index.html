<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdWork - Login</title>
    <link rel="stylesheet" href="styles.css" />
    <meta name="description" content="Conectamos trabajadores con negocios para turnos y extras en Andorra." />
    <meta property="og:title" content="AdWork - Extras y turnos en Andorra" />
    <meta property="og:description" content="Conectamos trabajadores con negocios para turnos y extras en Andorra." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <main class="container">
      <div class="lang-switcher">
        <button type="button" id="langToggle" class="lang-btn">
          <span id="currentLang">CA</span> ▾
        </button>

        <div id="langMenu" class="lang-menu hidden">
          <button type="button" class="lang-option" data-lang="ca">Català</button>
          <button type="button" class="lang-option" data-lang="es">Español</button>
        </div>
      </div>

      <header class="header">
        <div class="logo">AdWork</div>
        <p class="subtitle" data-i18n="hero_subtitle">Extras i torns per hores a Andorra</p>
      </header>

      <section id="authCard" class="card">
        <div class="tabs">
          <button id="tabLogin" class="tab active" data-i18n="tab_login">Iniciar sessió</button>
          <button id="tabRegister" class="tab" data-i18n="tab_register">Registrar-me</button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" class="form">
          <label>
             <span data-i18n="label_email">Email</span>
            <input id="loginEmail" type="email" placeholder="tu@email.com" required />
          </label>

          <label>
            <span data-i18n="label_password">Contrasenya</span>
            <input id="loginPassword" type="password" placeholder="••••••••" required />
          </label>

          <button type="submit" class="btn primary">Entrar</button>

          <button type="button" id="resetBtn" class="btn ghost">
            ¿Olvidaste tu contraseña?
          </button>
        </form>

        <!-- REGISTER -->
          <form id="registerForm" class="form hidden">
            <label>
              <span data-i18n="label_name">Nom</span>
              <input id="regName" type="text" placeholder="Diego" required />
            </label>
          
            <label>
              <span data-i18n="label_email">Email</span>
              <input id="regEmail" type="email" placeholder="tu@email.com" required />
            </label>
          
            <label>
              <span data-i18n="label_password">Contrasenya</span>
              <input id="regPassword" type="password" placeholder="Mínim 6 caràcters" minlength="6" required />
            </label>
          
            <label>
              <span data-i18n="label_role">Soc</span>
              <select id="regRole" required>
                <option value="worker" data-i18n="role_worker">Treballador (extres)</option>
                <option value="business" data-i18n="role_business">Negoci</option>
              </select>
            </label>
          
            <div id="businessFields" class="hidden">
              <label>
                <span data-i18n="label_company_name">de l’empresa</span> 
                <input id="regCompanyName" type="text" placeholder="Ex: Hotel Nevada" />
              </label>
            
              <label>
                <span data-i18n="label_company_type">Sector</span>
                <select id="regCompanyType">
                  <option value="hotel" data-i18n="company_type_hotel">Hotel</option>
                  <option value="restaurante" data-i18n="company_type_restaurant">Restaurant</option>
                  <option value="comercio" data-i18n="company_type_shop">Comerç</option>
                  <option value="otros" data-i18n="company_type_other">Altres</option>
                </select>
              </label>
            
              <label>
                <span data-i18n="label_company_location">Ubicació</span>
                <input id="regCompanyLocation" type="text" placeholder="Ex: Escaldes" />
              </label>
            </div>

              <!-- TERMINOS Y CONDICIONES -->
          <label style="flex-direction:row; align-items:center; gap:8px;">
            <input type="checkbox" id="acceptTerms" required />
            <span>
              <span data-i18n="accept_prefix">Accepto els</span>
              <a href="terms.html" target="_blank" data-i18n="footer_terms">Termes</a>
              <span data-i18n="accept_and">i la</span>
              <a href="privacy.html" target="_blank" data-i18n="footer_privacy">Privacitat</a>
            </span>
          </label>
          
            <button type="submit" class="btn primary" data-i18n="btn_create_account">Crear compte</button>
          </form>

        <div id="msg" class="msg" aria-live="polite"></div>
      </section>

      <section id="afterLogin" class="card hidden">
        <h2 class="title" data-i18n="session_started">Sessió iniciada ✅</h2>
        <p id="userInfo" class="subtitle"></p>
        <button id="logoutBtn" class="btn danger" data-i18n="btn_logout">Tancar sessió</button>
      </section>
    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>

    <footer>
      <div>
        <a href="terms.html" data-i18n="footer_terms">Termes</a> ·
        <a href="privacy.html" data-i18n="footer_privacy">Privacitat</a>
      </div>
      <div data-i18n="footer_contact">
        © 2026 AdWork · contacte: adwork.contacto@gmail.com
      </div>
    </footer>
  </body>
</html>
